<header class="navbar-cafetal" [class.scrolled]="scrolled()">
  <nav class="navbar-inner">
    <a class="brand" routerLink="/" aria-label="Inicio">
      <img src="/logo.jpg" alt="Cafetal Sobre Piedra" class="brand-logo">
      <span class="brand-name">Cafetal<br>Sobre&nbsp;Piedra</span>
    </a>

    <div class="nav-center">
      <a class="nav-tab" routerLink="/historia" routerLinkActive="active">Historia</a>

      <div class="nav-productos-drop">
        <span class="nav-tab">Productos</span>
        <div class="nav-productos-menu">
          <a class="dropdown-item" routerLink="/catalogo/cafe" routerLinkActive="active">Café empacado</a>
          <a class="dropdown-item" routerLink="/catalogo/otros-productos" routerLinkActive="active">Otros productos</a>
          <a class="dropdown-item" routerLink="/para-regalar" routerLinkActive="active">Para regalar</a>
        </div>
      </div>
      <a class="nav-tab" routerLink="/distribuidor" routerLinkActive="active">Distribuidores</a>
      <a class="nav-tab" routerLink="/recetas" routerLinkActive="active">Recetas</a>
      <a class="nav-tab" routerLink="/contacto" routerLinkActive="active">Contacto</a>
    </div>

    <button class="hamburger" (click)="toggleMenu()" aria-label="Menú">☰</button>
  </nav>

  @if (menuOpen()) {
    <div class="mobile-menu">
      <a class="mobile-link" routerLink="/historia" routerLinkActive="active" (click)="closeMenu()">Historia</a>
      <a class="mobile-link" routerLink="/catalogo/cafe" routerLinkActive="active" (click)="closeMenu()">Café empacado</a>
      <a class="mobile-link" routerLink="/catalogo/otros-productos" routerLinkActive="active" (click)="closeMenu()">Otros productos</a>
      <a class="mobile-link" routerLink="/para-regalar" routerLinkActive="active" (click)="closeMenu()">Para regalar</a>
      <a class="mobile-link" routerLink="/distribuidor" routerLinkActive="active" (click)="closeMenu()">Distribuidores</a>
      <a class="mobile-link" routerLink="/recetas" routerLinkActive="active" (click)="closeMenu()">Recetas</a>
      <a class="mobile-link" routerLink="/contacto" routerLinkActive="active" (click)="closeMenu()">Contacto</a>
    </div>
  }
</header>
