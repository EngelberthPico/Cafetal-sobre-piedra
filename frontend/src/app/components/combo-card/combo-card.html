<div class="card h-100">
  <div class="card-body">
    <h5 class="card-title">{{ combo().nombre }}</h5>
    <p class="card-text">{{ combo().descripcion }}</p>

    <p class="fw-semibold mb-1">Incluye:</p>
    <ul>
      @for (item of combo().incluye; track item) {
        <li>{{ item }}</li>
      }
    </ul>

    <p class="card-text fw-bold">
      {{ combo().precio | currency:'COP ':'symbol':'1.0-0' }}
    </p>
  </div>
</div>
